ingestion:
  dataset_root: data/raw/alzheimers_multiclass
  output_manifest: data/processed/manifest.csv
  output_report: data/reports/ingestion_summary.json
  duplicate_report: data/reports/duplicate_report.csv
  download: false
  dataset_handle: aryansinghal10/alzheimers-multiclass-dataset-equal-and-augmented
  patient_id_regex: null
  allowed_extensions:
    - .jpg
    - .jpeg
    - .png
  min_image_size:
    - 128
    - 128
  aspect_ratio_range:
    - 0.75
    - 1.4
  min_stddev: 0.03
  min_center_border_diff: 0.02
  duplicate_hash_distance: 6
  label_to_id:
    NonDemented: 0
    VeryMildDemented: 1
    MildDemented: 2
    ModerateDemented: 3

validation:
  manifest_path: data/processed/manifest.csv
  output_report: data/reports/validation_report.json
  approved_manifest: data/processed/validated_manifest.csv
  label_to_id:
    NonDemented: 0
    VeryMildDemented: 1
    MildDemented: 2
    ModerateDemented: 3

features:
  validated_manifest: data/processed/validated_manifest.csv
  output_features: data/processed/features.npz
  output_report: data/reports/features_report.json
  image_size:
    - 128
    - 128
  split_ratios:
    - 0.6
    - 0.2
    - 0.2
  split_random_state: 42

model:
  input_features: data/processed/features.npz
  output_model: models/trained/logistic_regression.pkl
  output_report: data/reports/training_report.json
  max_iter: 500
  model_name: alzheimer_detector
  model_version: v1

evaluation:
  input_features: data/processed/features.npz
  input_model: models/trained/logistic_regression.pkl
  output_report: data/reports/evaluation_report.json

experiment_tracking:
  enabled: true
  run_id: null
  local_runs_dir: data/experiments
  update_latest_reports: true
  save_config_snapshot: true
  save_stage_artifacts: true
  remote:
    enabled: true
    backend: mlflow
    tracking_uri: http://127.0.0.1:5000
    experiment_name: alzheimer_detection
    artifact_location: null

serving:
  model_path: models/trained/logistic_regression.pkl
  model_name: alzheimer_detector
  image_size:
    - 128
    - 128
  min_image_size:
    - 128
    - 128
  aspect_ratio_range:
    - 0.75
    - 1.4
  min_stddev: 0.03
  min_center_border_diff: 0.02
  host: 127.0.0.1
  port: 8000
  log_level: INFO
  label_to_id:
    NonDemented: 0
    VeryMildDemented: 1
    MildDemented: 2
    ModerateDemented: 3
