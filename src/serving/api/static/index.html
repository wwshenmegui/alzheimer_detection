<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alzheimer Detection</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffaf2;
      --text: #1e1a17;
      --muted: #6b6258;
      --accent: #9c5f2d;
      --accent-dark: #7d4b22;
      --border: #d8c8b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(156, 95, 45, 0.18), transparent 34%),
        linear-gradient(180deg, #f8f2e9 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .card {
      width: min(100%, 520px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 22px 50px rgba(60, 38, 18, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 18px;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .preview {
      display: none;
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .preview.visible {
      display: block;
    }

    .preview-label {
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    .preview img {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 10px;
      background: #f8f3ec;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .result {
      min-height: 32px;
      margin-top: 22px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .error {
      color: #9f2d20;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Alzheimer Detection</h1>
    <p>Please upload an MRI image and click predict to see the severity.</p>

    <form id="predict-form">
      <label for="image">Upload MRI image</label>
      <input id="image" name="file" type="file" accept="image/*" required>
      <div id="preview" class="preview" aria-live="polite">
        <div class="preview-label">Image preview</div>
        <img id="preview-image" alt="Uploaded MRI preview">
      </div>
      <button id="predict-button" type="submit">Predict</button>
    </form>

    <div id="result" class="result" aria-live="polite"></div>
  </main>

  <script>
    const form = document.getElementById('predict-form');
    const fileInput = document.getElementById('image');
    const result = document.getElementById('result');
    const button = document.getElementById('predict-button');
    const preview = document.getElementById('preview');
    const previewImage = document.getElementById('preview-image');

    const severityLabels = {
      NonDemented: 'Non Demented',
      VeryMildDemented: 'Very Mild Demented',
      MildDemented: 'Mild Demented',
      ModerateDemented: 'Moderate Demented',
    };

    fileInput.addEventListener('change', () => {
      const [file] = fileInput.files;
      if (!file) {
        preview.classList.remove('visible');
        previewImage.removeAttribute('src');
        return;
      }

      previewImage.src = URL.createObjectURL(file);
      preview.classList.add('visible');
      result.textContent = '';
      result.className = 'result';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!fileInput.files.length) {
        result.textContent = 'Please choose an image first.';
        result.className = 'result error';
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      button.disabled = true;
      result.textContent = 'Predicting...';
      result.className = 'result';

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          body: formData,
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || 'Prediction failed.');
        }

        const friendlySeverity = severityLabels[payload.predicted_label] || payload.predicted_label;
        result.textContent = `Severity: ${friendlySeverity}`;
        result.className = 'result';
      } catch (error) {
        result.textContent = error.message;
        result.className = 'result error';
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
